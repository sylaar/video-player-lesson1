<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="/static/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="shortcut icon" href="/static/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />
  <link rel="manifest" href="/static/site.webmanifest" />
  <title>Видео плеер</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <meta charset="utf-8">
  <style type="text/css">
    .player-container {
      display: flex;
      flex-direction: column;
      width: 800px;
      height: 600px;
      box-shadow: 0 0 10px rgba(0,0,0,2);
    }
    .video-container {
      flex-grow: 99;
    }
    .control-buttons-container {
      display: flex;
      flex-grow: 1;
      gap: 5px;
      background-color:black;
    }
    .control-button {
      border-style:none;
      cursor:pointer;
      background-color:transparent;
    }
    .button-separator {
      flex-grow: 1;
    }
    .control-button .fa {
      color:white;
      font-size: large;
      width: 20px;
    }
  </style>
</head>
<body>
  <div class="player-container" id="player">
    <div class="js-video-container video-container"></div>
    <div class="control-buttons-container">
      <button class="control-button js-play-button">
        <i class="fa fa-play" aria-hidden="true"></i>
      </button>
      <button class="control-button js-pause-button">
        <i class="fa fa-pause" aria-hidden="true"></i>
      </button>
      <button class="control-button js-mute-button">
        <i class="fa fa-volume-up" aria-hidden="true"></i>
      </button>
      <button class="control-button js-volume-button">
        <i class="fa fa-volume-off" aria-hidden="true"></i>
      </button>
      <div class="button-separator"></div>
      <button class="control-button js-fullscreen-button">
        <i class="fa fa-expand" aria-hidden="true"></i>
      </button>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="player.js"></script>

  <script type="text/javascript">
    createPlayer({elementId: 'player'});
  </script>

</body>
</html>
